<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Santri Baru</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <nav>
        <div class="logo">Pesantren Ahsanuamala</div>
        <ul>
            <li><a href="index.html">Kembali ke Beranda</a></li>
        </ul>
    </nav>

    <section class="pendaftaran-page">
        <div class="form-container">
            <h2>Formulir Pendaftaran</h2>
            <p>Lengkapi data calon santri dengan benar.</p>
            
            <form id="waForm">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Contoh: Fathziel" required>
                </div>
                
                <div class="form-group">
                    <label>Alamat Asal</label>
                    <input type="text" id="alamat" placeholder="Contoh: Tangerang" required>
                </div>

                <div class="form-group">
                    <label>Pilihan Program</label>
                    <select id="program" required>
                        <option value="">-- Pilih Program --</option>
                        <option value="Tahfidz">Tahfidz Al-Qur'an</option>
                        <option value="Kitab Kuning">Kajian Kitab Kuning</option>
                        <option value="Reguler">SMP/SMA Terpadu</option>
                    </select>
                </div>

                <button type="button" onclick="sendToWA()" class="btn-submit">Kirim via WhatsApp</button>
            </form>
        </div>
    </section>

    <script>
        function sendToWA() {
            const nama = document.getElementById('nama').value;
            const alamat = document.getElementById('alamat').value;
            const program = document.getElementById('program').value;
            const nomorWA = "6281234567890"; // GANTI DENGAN NOMOR WA PONDOK (Gunakan 62 di depan)

            const pesan = `Halo Admin, saya ingin mendaftar ke Pondok.%0A%0A*Nama:* ${nama}%0A*Alamat:* ${alamat}%0A*Program:* ${program}`;
            
            window.open(`https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesan}`, '_blank');
        }
    </script>

</body>
</html>
